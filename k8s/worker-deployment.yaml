apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gc-worker
  template:
    metadata:
      labels:
        app: gc-worker
    spec:
      containers:
        - name: gc-worker
          image: ghcr.io/yourorg/guestcompass-worker:latest
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: service-role-key
            - name: WHATSAPP_PHONE_NUMBER_ID
              valueFrom:
                secretKeyRef:
                  name: whatsapp-secrets
                  key: phone-number-id
            - name: WHATSAPP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: whatsapp-secrets
                  key: access-token
            - name: WHATSAPP_WEBHOOK_VERIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: whatsapp-secrets
                  key: webhook-verify-token
            - name: WHATSAPP_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: whatsapp-secrets
                  key: app-secret
            - name: WHATSAPP_BUSINESS_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: whatsapp-secrets
                  key: business-account-id
            - name: BULLMQ_CONCURRENCY
              value: "20"
            - name: WORKER_HTTP
              value: "1"
            - name: WORKER_HTTP_PORT
              value: "9090"
          resources:
            limits:
              cpu: "1000m"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
